// Updated WebGL HTML Code
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poppy Playtime - Chapter 1</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let handLeft, handRight;
        let grabPackActive = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const light = new THREE.AmbientLight(0xffffff, 1);
            scene.add(light);

            // Hands
            createHands();

            // Position camera
            camera.position.z = 5;

            window.addEventListener('keydown', onKeyDown);
        }

        function createHands() {
            const handGeometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const handMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            handLeft = new THREE.Mesh(handGeometry, handMaterial);
            handRight = new THREE.Mesh(handGeometry, handMaterial);

            handLeft.position.x = -1;
            handRight.position.x = 1;

            scene.add(handLeft);
            scene.add(handRight);
        }

        function onKeyDown(event) {
            if (event.key === 'q') {
                // Activate grab pack left
                grabPackActive = true;
                console.log('Grab pack activated with Q');
            } else if (event.key === 'e') {
                // Activate grab pack right
                grabPackActive = true;
                console.log('Grab pack activated with E');
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            // Update hand positions and any animations here
            if (grabPackActive) {
                // Implement grabbing mechanics
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
